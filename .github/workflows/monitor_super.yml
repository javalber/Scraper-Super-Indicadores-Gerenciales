name: Monitor Superfinanciera

on:
  schedule:
    - cron: "0 13,19 * * *"  # 08:00 y 14:00 hora Colombia
  workflow_dispatch:

# Permite que el workflow haga commit/push de ultimo_mes.txt automáticamente.
permissions:
  contents: write

jobs:
  check_new_report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        id: scraping
        run: python scrap_sup_ind.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit changes if new month
        if: steps.scraping.outputs.nuevo == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultimo_mes.txt
          git commit -m "Actualizar último mes detectado: $(head -n1 ultimo_mes.txt)"
          # Reintenta sobre la última versión de la rama para evitar conflictos.
          git pull --rebase origin ${{ github.ref_name }}
          git push
